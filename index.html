<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FloraLense AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
</head>
<body class="bg-dark text-light">

    <div class="fixed-top p-3 text-center z-3">
        <h2 class="fw-bold text-success mb-0"><i class="fa-solid fa-leaf"></i> FloraLense</h2>
        <p id="status-text" class="small text-warning fw-bold bg-dark bg-opacity-75 d-inline-block px-3 py-1 rounded-pill mt-2">
            Loading AI Brain (84MB)...
        </p>
    </div>

    <div class="camera-wrapper">
        <video id="camera-feed" autoplay playsinline></video>
        <canvas id="photo-canvas" class="d-none"></canvas>
    </div>

    <div class="fixed-bottom p-4 z-3 d-flex flex-column align-items-center mb-3">
        
        <div id="loading-spinner" class="spinner-border text-success mb-3 d-none" role="status" style="width: 3rem; height: 3rem;">
            <span class="visually-hidden">Analyzing...</span>
        </div>

        <div id="result-card" class="card bg-dark border-success w-100 shadow-lg d-none mb-3" style="max-width: 400px; border-width: 2px;">
            <div class="card-body text-center">
                <h3 id="plant-name" class="fw-bold text-success mb-0">Plant Name</h3>
                <p id="plant-id" class="text-muted small mb-3 fst-italic">Scientific Name</p>
                <div class="d-flex justify-content-between border-top border-secondary pt-2 text-start">
                    <small><strong>Family:</strong> <span id="plant-family" class="text-light">...</span></small>
                    <small><strong>Genus:</strong> <span id="plant-genus" class="text-light">...</span></small>
                </div>
            </div>
        </div>

        <button id="capture-btn" class="shutter-btn shadow-lg" disabled>
            <i class="fa-solid fa-camera fa-2x text-dark"></i>
        </button>

        <button id="reset-btn" class="btn btn-outline-light rounded-pill px-4 py-2 shadow d-none mt-2">
            <i class="fa-solid fa-rotate-right"></i> Scan Another
        </button>

    </div>

    <script src="app.js"></script>
</body>
</html>
